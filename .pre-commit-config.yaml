repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        additional_dependencies: [flake8-docstrings]
        # Phase 2 / Schritt 4: flake8 liest die zentrale `.flake8`-Config.
        # Keine doppelten CLI-Args hier, damit Pre-Commit und CI
        # dieselben Regeln anwenden.

  - repo: local
    hooks:
      - id: python-compile
        name: Python compile check
        entry: python -m compileall -q
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]
