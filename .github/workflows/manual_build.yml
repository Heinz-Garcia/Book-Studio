name: Manual Build EXE

on:
  workflow_dispatch: # Enables the manual "Run workflow" button

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Stable version for executables

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          # Replace 'main.py' with your actual entry script name if different
          pyinstaller --onefile --windowed main.py 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Book-Studio-Windows-EXE
          path: dist/*.exe
