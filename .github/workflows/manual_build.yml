name: Manual Build EXE

on:
  workflow_dispatch: # Ermöglicht den manuellen "Run workflow" Button

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller pillow

      - name: Build EXE with PyInstaller
        run: |
          # Nutzt Ihr Start-Skript und unterdrückt die Konsole beim Start
          pyinstaller --onefile --windowed book_studio.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Book-Studio-Windows-EXE
          path: dist/*.exe
