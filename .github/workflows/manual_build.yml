name: Manual Build EXE

on:
  push:
    branches: [ main ] # Triggers the build automatically once you save
  workflow_dispatch:   # Provides the manual "Run workflow" button

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          # Note: Ensure your main file is named 'main.py' or change it here
          pyinstaller --onefile --windowed main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Book-Studio-Windows-EXE
          path: dist/*.exe
