[pytest]
markers =
    slow: marks tests as slow (involves real Quarto render). Run with `-m "not slow"` in fast CI loops.
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
testpaths =
    tests
addopts =
    -ra
# B10: Coverage-Konfiguration für Service-Layer.
[coverage:run]
source =
    services
    app_config
    session_state
    frontmatter_parser
    quarto_block_parser
omit =
    */tests/*
    */__init__.py
[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    \.\.\.
show_missing = True
skip_covered = False
