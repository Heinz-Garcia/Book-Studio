[pytest]
markers =
    slow: marks tests as slow (involves real Quarto render). Run with `-m "not slow"` in fast CI loops.
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
testpaths =
    tests
addopts =
    -ra
# B10: Coverage-Konfiguration für Service-Layer.
[coverage:run]
source =
    services
    app_config
    session_state
    frontmatter_parser
    quarto_block_parser
omit =
    */tests/*
    */__init__.py
[coverage:report]
# Phase 2 / Schritt 4: Coverage-Gate.
# Pytest bricht ab, wenn die Gesamt-Coverage unter 80 % faellt.
# Aktueller Stand: 97 % (Service-Layer) — das Gate ist grosszuegig
# gewaehlt, damit nicht jeder Mini-Refactor rot wird, aber grobe
# Vergessen (z. B. ein neuer Service ohne Tests) schlagen sofort auf.
fail_under = 80
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    \.\.\.
show_missing = True
skip_covered = False
